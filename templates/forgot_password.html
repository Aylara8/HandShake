{% extends "base.html" %}

{% block title %}HandShake | {{ t('auth.forgot_password') }}{% endblock %}

{% block content %}
<div class="auth-container" style="max-width: 560px; margin: 60px auto;">
    <div class="auth-header" style="text-align: center;">
        <h2 style="font-weight: 800; letter-spacing: -1px;">{{ t('auth.forgot_password') }}</h2>
        <p style="color: var(--text-secondary); margin-bottom: 28px;">{{ t('auth.forgot_intro') }}</p>
    </div>

    <form class="auth-form" action="{{ url_for('forgot_password') }}" method="POST" style="border: 1px solid var(--border); border-radius: 14px; padding: 18px;">
        <div class="form-group">
            <input type="email" name="email" placeholder="{{ t('auth.email_placeholder') }}" required value="{{ prefill_email or '' }}">
        </div>
        <button type="submit" class="auth-btn" style="padding: 14px;">{{ t('auth.send_verification') }}</button>
    </form>

    <div class="auth-footer" style="margin-top: 18px;">
        {{ t('auth.back_to_login') }} <a href="{{ url_for('login') }}">{{ t('nav.login') }}</a>
    </div>
</div>
{% endblock %}
