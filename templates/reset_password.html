{% extends "base.html" %}

{% block title %}HandShake | {{ t('auth.reset_from_email') }}{% endblock %}

{% block content %}
<div class="auth-container" style="max-width: 560px; margin: 60px auto;">
    <div class="auth-header" style="text-align: center;">
        <h2 style="font-weight: 800; letter-spacing: -1px;">{{ t('auth.reset_from_email') }}</h2>
        <p style="color: var(--text-secondary); margin-bottom: 28px;">{{ t('auth.recovery_subtitle') }}</p>
    </div>

    <form class="auth-form" action="{{ url_for('reset_password', token=token) }}" method="POST" style="border: 1px solid var(--border); border-radius: 14px; padding: 18px;">
        <div class="form-group">
            <input type="password" name="new_password" placeholder="{{ t('auth.new_password') }}" minlength="6" required>
        </div>
        <div class="form-group">
            <input type="password" name="confirm_password" placeholder="{{ t('auth.confirm_new_password') }}" minlength="6" required>
        </div>

        <button type="submit" class="auth-btn" style="padding: 14px;">{{ t('auth.reset_password') }}</button>
    </form>
</div>
{% endblock %}
