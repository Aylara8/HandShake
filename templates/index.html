{% extends "layout.html" %}
{% block content %}

<div id="reticle">
    <div class="line-h"></div>
    <div class="line-v"></div>
    <div class="coords">SCANNING...</div>
</div>

<style>
    #reticle {
        position: fixed;
        width: 40px;
        height: 40px;
        border: 1px solid rgba(0, 212, 255, 0.5);
        pointer-events: none; /* Let clicks pass through to 3D */
        z-index: 100;
        transform: translate(-50%, -50%);
        transition: width 0.3s, height 0.3s;
    }
    .line-h, .line-v {
        position: absolute;
        background: var(--nasa-blue);
        opacity: 0.5;
    }
    .line-h { width: 100%; height: 1px; top: 50%; }
    .line-v { width: 1px; height: 100%; left: 50%; }
    .coords {
        position: absolute;
        bottom: -20px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 8px;
        color: var(--nasa-blue);
        white-space: nowrap;
    }
</style>


<div id="canvas-container"></div>

<div id="ui-layer">
    <div class="terminal-window">
        <div class="status-bar">
            <span class="dot red"></span>
            <span class="dot yellow"></span>
            <span class="dot green"></span>
            <span class="title">ASTROLENS // SYSTEM_BOOT_V2.0</span>
        </div>
        <div class="content">
            <h2 class="glitch-text">INTERSTELLAR_NAV</h2>
            <p class="typing">TARGET IDENTIFIED: MARS. CLICK PLANET TO DESCEND.</p>
        </div>
    </div>
</div>

<style>
    /* The Flash Overlay */
    body.warping {
        animation: warpFlash 0.5s forwards;
    }

    @keyframes warpFlash {
        0% { filter: blur(0px) brightness(1); }
        50% { filter: blur(10px) brightness(2); }
        100% { filter: blur(20px) brightness(5); }
    }




    /* Add a subtle vignette to make the center of the screen pop */
    #canvas-container::after {
        content: '';
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.8) 100%);
        pointer-events: none;
    }
</style>

<style>
    /* UI Container */
    #ui-layer {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        pointer-events: none; /* Allows clicking through to 3D */
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding-top: 5vh;
    }

    /* Futuristic Terminal */
    .terminal-window {
        background: rgba(0, 20, 40, 0.7);
        border: 1px solid #00d4ff;
        backdrop-filter: blur(10px);
        width: 400px;
        box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
        animation: slideDown 1s ease-out;
    }

    .status-bar {
        background: rgba(0, 212, 255, 0.2);
        padding: 8px;
        display: flex;
        align-items: center;
        border-bottom: 1px solid #00d4ff;
    }

    .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; }
    .red { background: #ff5f56; } .yellow { background: #ffbd2e; } .green { background: #27c93f; }
    .title { font-size: 10px; color: #00d4ff; margin-left: 10px; font-family: monospace; }

    .content { padding: 20px; text-align: center; }
    .glitch-text { color: white; font-family: 'Courier New', monospace; letter-spacing: 4px; margin: 0; }
    .typing { color: #00d4ff; font-size: 12px; font-family: monospace; overflow: hidden; white-space: nowrap; border-right: 2px solid; animation: typing 3s steps(30), blink 0.5s step-end infinite alternate; }

    @keyframes slideDown { from { transform: translateY(-100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes typing { from { width: 0 } to { width: 100% } }
    @keyframes blink { 50% { border-color: transparent } }
</style>

{% endblock %}
